
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nafiul204AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #14181f;
      --border: #232834;
      --accent: #e8b86d;
      --accent2: #c97d3a;
      --text: #e8e2d9;
      --muted: #7a8094;
      --glow: rgba(232, 184, 109, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Ambient glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232,184,109,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 52px 0 36px;
    }

    .logo-badge {
      display: inline-block;
      font-family: 'Lora', serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(232,184,109,0.3);
      padding: 6px 18px;
      border-radius: 2px;
      margin-bottom: 20px;
      background: rgba(232,184,109,0.05);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      background: linear-gradient(135deg, #f0d9a8 0%, var(--accent) 50%, #c97d3a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 28px auto 0;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
    }

    /* Input area */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .input-label {
      display: block;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      font-family: 'Lora', serif;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Lora', serif;
      font-size: 15px;
      padding: 14px 16px;
      resize: none;
      height: 60px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      line-height: 1.6;
    }

    textarea::placeholder { color: var(--muted); font-style: italic; }

    textarea:focus {
      border-color: rgba(232,184,109,0.5);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .send-btn {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #1a1108;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 0 24px;
      height: 60px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,184,109,0.2);
      white-space: nowrap;
    }

    .send-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(232,184,109,0.35);
    }

    .send-btn:active:not(:disabled) { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Output area */
    .output-section {
      display: none;
      animation: fadeSlideUp 0.5s ease forwards;
    }

    .output-section.visible { display: block; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .output-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'Lora', serif;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .output-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 12px;
      padding: 32px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .output-card::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 80px;
      color: rgba(232,184,109,0.07);
      line-height: 1;
      pointer-events: none;
    }

    #output-text {
      font-size: 16px;
      line-height: 1.9;
      color: var(--text);
      font-style: italic;
      white-space: pre-wrap;
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Loading dots */
    .loading {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
      font-style: italic;
      padding: 20px 0;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    /* Query chip shown above result */
    .query-chip {
      display: inline-block;
      background: rgba(232,184,109,0.08);
      border: 1px solid rgba(232,184,109,0.2);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.3px;
      margin-bottom: 20px;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 50px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    footer span { color: var(--accent); }

    @media (max-width: 520px) {
      .input-row { flex-direction: column; }
      .send-btn { width: 100%; }
      .output-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-badge">✦ AI Writer</div>
    <h1>Nafiul204AI</h1>
    <p class="tagline">Ask anything — receive a beautifully written paragraph.</p>
    <div class="divider"></div>
  </header>

  <div class="container">
    <div class="input-section">
      <label class="input-label">✦ Your Topic</label>
      <div class="input-row">
        <textarea id="user-input" placeholder="e.g. How to write a tea stall…" rows="2"></textarea>
        <button class="send-btn" id="send-btn" onclick="generate()">Generate ✦</button>
      </div>
    </div>

    <div class="output-section" id="output-section">
      <div class="output-header">
        <span class="output-label">✦ Generated Paragraph</span>
        <button class="copy-btn" onclick="copyText()">Copy</button>
      </div>
      <div class="output-card">
        <div id="query-chip" class="query-chip"></div>
        <div id="output-text"></div>
      </div>
    </div>
  </div>

  <footer>
    Crafted with care &nbsp;·&nbsp; <span>Nafiul204AI</span>
  </footer>

  <script>
    const inputEl  = document.getElementById('user-input');
    const outputEl = document.getElementById('output-text');
    const section  = document.getElementById('output-section');
    const sendBtn  = document.getElementById('send-btn');
    const chipEl   = document.getElementById('query-chip');

    // Allow Enter to submit (Shift+Enter for newline)
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });

    async function generate() {
      const topic = inputEl.value.trim();
      if (!topic) return;

      // Show loading
      sendBtn.disabled = true;
      section.className = 'output-section visible';
      chipEl.textContent = '🔍 ' + topic;
      outputEl.innerHTML = `
        <div class="loading">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          &nbsp; Writing your paragraph…
        </div>`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `You are Nafiul204AI, an elegant paragraph writer. 
Your ONLY job is to write ONE single, well-crafted paragraph about any topic the user gives you.
Rules:
- Write ONLY a paragraph — no headings, no bullet points, no lists, no titles, no numbered items.
- The paragraph must be fluent, descriptive, and engaging.
- Do NOT say "Here is a paragraph" or any introduction — just write the paragraph directly.
- Keep it between 80–150 words.
- Write in a clear, beautiful style.`,
            messages: [{ role: 'user', content: topic }]
          })
        });

        const data = await response.json();
        const text = data.content?.map(b => b.text || '').join('') || 'Could not generate a response. Please try again.';

        // Typewriter effect
        outputEl.innerHTML = '';
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        outputEl.appendChild(cursor);

        function typeChar() {
          if (i < text.length) {
            outputEl.insertBefore(document.createTextNode(text[i]), cursor);
            i++;
            setTimeout(typeChar, 18);
          } else {
            cursor.remove();
          }
        }
        typeChar();

      } catch (err) {
        outputEl.innerHTML = '<span style="color:#c97d3a">Something went wrong. Please try again.</span>';
      }

      sendBtn.disabled = false;
    }

    function copyText() {
      const text = outputEl.innerText;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }
  </script>
</body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nafiul204AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0e12;
      --surface: #13161d;
      --border: #1f2330;
      --gold: #e8b86d;
      --gold2: #c97d3a;
      --text: #e8e2d9;
      --muted: #6b7385;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
    }

    /* Top glow */
    .glow-top {
      position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,184,109,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative; z-index: 1;
      text-align: center;
      padding: 56px 0 40px;
      animation: fadeDown 0.7s ease forwards;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(232,184,109,0.25);
      padding: 6px 20px; border-radius: 2px;
      background: rgba(232,184,109,0.04);
      margin-bottom: 22px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, #f5e0b0 0%, #e8b86d 45%, #c97d3a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1; letter-spacing: -1px;
    }

    .tagline {
      margin-top: 14px; font-size: 14px;
      color: var(--muted); font-style: italic; letter-spacing: 0.4px;
    }

    .rule {
      width: 50px; height: 1px; margin: 26px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Container */
    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 740px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Input card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      margin-bottom: 24px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    }

    .card-label {
      font-size: 10px; letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }

    .row {
      display: flex; gap: 12px; align-items: stretch;
      flex-wrap: wrap;
    }

    textarea {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'Lora', serif; font-size: 15px;
      padding: 14px 16px; resize: none; height: 64px;
      outline: none; line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea::placeholder { color: var(--muted); font-style: italic; }
    textarea:focus {
      border-color: rgba(232,184,109,0.4);
      box-shadow: 0 0 0 3px rgba(232,184,109,0.08);
    }

    .btn {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border: none; border-radius: 9px;
      color: #1c1000; font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 14px;
      padding: 0 26px; min-height: 64px;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 4px 22px rgba(232,184,109,0.22);
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) {
      opacity: 0.88; transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,184,109,0.35);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Loading */
    .loading {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-style: italic; font-size: 14px;
      padding: 14px 4px;
    }
    .dots { display: flex; gap: 6px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.1s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity: 0.35; }
      50%      { transform: translateY(-7px); opacity: 1; }
    }

    /* Error */
    .error-box {
      background: rgba(201,90,58,0.08);
      border: 1px solid rgba(201,90,58,0.3);
      border-radius: 9px; padding: 14px 18px;
      color: #e07a5a; font-size: 14px; margin-bottom: 20px;
    }

    /* Output */
    .out-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 14px;
    }
    .out-label {
      font-size: 10px; letter-spacing: 3.5px;
      text-transform: uppercase; color: var(--gold);
    }
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted);
      font-family: 'Lora', serif; font-size: 12px;
      padding: 6px 16px; cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

    .out-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 14px; padding: 34px 38px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
      animation: fadeUp 0.4s ease forwards;
    }
    .out-card::before {
      content: '"';
      position: absolute; top: 6px; left: 18px;
      font-family: 'Playfair Display', serif; font-size: 90px;
      color: rgba(232,184,109,0.06); line-height: 1; pointer-events: none;
    }

    .chip {
      display: inline-block;
      background: rgba(232,184,109,0.07);
      border: 1px solid rgba(232,184,109,0.18);
      border-radius: 20px; padding: 5px 14px;
      font-size: 12px; color: var(--gold);
      margin-bottom: 18px; letter-spacing: 0.3px;
    }

    #para {
      font-size: 16px; line-height: 1.95;
      color: var(--text); font-style: italic; margin: 0;
    }

    /* Cursor blink */
    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--gold); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.75s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    footer {
      position: relative; z-index: 1; text-align: center;
      margin-top: 60px; font-size: 12px;
      color: var(--muted); letter-spacing: 1px;
    }
    footer span { color: var(--gold); }

    @media (max-width: 500px) {
      .row { flex-direction: column; }
      .btn { min-height: 52px; }
      .out-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<div class="glow-top"></div>

<header>
  <div class="badge">✦ Paragraph AI</div>
  <h1>Nafiul204AI</h1>
  <p class="tagline">Type any topic — get a beautifully written paragraph.</p>
  <div class="rule"></div>
</header>

<div class="wrap">

  <!-- Input -->
  <div class="card">
    <div class="card-label">✦ Your Topic</div>
    <div class="row">
      <textarea id="inp" placeholder="e.g. How to write a tea stall…"></textarea>
      <button class="btn" id="genbtn" onclick="generate()">Generate ✦</button>
    </div>
  </div>

  <!-- Status -->
  <div id="loading" class="loading" style="display:none">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    Writing your paragraph…
  </div>

  <div id="errbox" class="error-box" style="display:none"></div>

  <!-- Output -->
  <div id="outbox" style="display:none">
    <div class="out-header">
      <span class="out-label">✦ Generated Paragraph</span>
      <button class="copy-btn" onclick="copyText()">Copy</button>
    </div>
    <div class="out-card">
      <div id="chip" class="chip"></div>
      <p id="para"></p>
    </div>
  </div>

</div>

<footer>Made with passion &nbsp;·&nbsp; <span>Nafiul204AI</span></footer>

<script>
  const inp    = document.getElementById('inp');
  const genbtn = document.getElementById('genbtn');
  const loading= document.getElementById('loading');
  const errbox = document.getElementById('errbox');
  const outbox = document.getElementById('outbox');
  const paraEl = document.getElementById('para');
  const chipEl = document.getElementById('chip');

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
  });

  async function generate() {
    const topic = inp.value.trim();
    if (!topic) return;

    // Reset UI
    genbtn.disabled = true;
    loading.style.display = 'flex';
    errbox.style.display = 'none';
    outbox.style.display = 'none';

    const prompt = `Write one single paragraph (80-150 words) about: "${topic}". 
Rules: Only a paragraph, no headings, no bullet points, no lists, no intro sentence like "Here is a paragraph". Just write the paragraph directly. Make it descriptive, engaging and beautiful.`;

    try {
      // Using Hugging Face Inference API - free, no login needed for this model
      const res = await fetch(
        'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            inputs: `<s>[INST] ${prompt} [/INST]`,
            parameters: {
              max_new_tokens: 200,
              temperature: 0.7,
              return_full_text: false,
              do_sample: true,
            }
          })
        }
      );

      if (!res.ok) {
        // Model might be loading — retry once after 20s
        if (res.status === 503) {
          errbox.textContent = '⏳ AI model is warming up (takes ~20 sec first time). Please try again in a moment!';
          errbox.style.display = 'block';
          loading.style.display = 'none';
          genbtn.disabled = false;
          return;
        }
        throw new Error('API error');
      }

      const data = await res.json();
      let text = '';

      if (Array.isArray(data) && data[0]?.generated_text) {
        text = data[0].generated_text.trim();
      } else if (data.generated_text) {
        text = data.generated_text.trim();
      }

      // Clean up any leftover instruction echoes
      text = text.replace(/^\[.*?\]/s, '').replace(/^Here is.*?:\s*/i, '').trim();
      // Take only first paragraph
      const firstPara = text.split(/\n\n/)[0].trim();
      if (!firstPara) throw new Error('Empty');

      loading.style.display = 'none';
      chipEl.textContent = '🔍 ' + topic;
      outbox.style.display = 'block';
      typewriter(paraEl, firstPara);

    } catch (e) {
      loading.style.display = 'none';
      errbox.textContent = '❌ Something went wrong. Please try again!';
      errbox.style.display = 'block';
    }

    genbtn.disabled = false;
  }

  function typewriter(el, text) {
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    let i = 0;
    function next() {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i++]), cursor);
        setTimeout(next, 16);
      } else {
        cursor.remove();
      }
    }
    next();
  }

  function copyText() {
    const text = paraEl.innerText;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
                                                      </html>
